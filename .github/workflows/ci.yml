name: Streamlit ML CI Pipeline

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
build:
name: Validate Streamlit App
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"
      cache: "pip"

  - name: Upgrade pip
    run: python -m pip install --upgrade pip

  - name: Install Dependencies
    run: pip install -r requirements.txt

  - name: Verify Model File Exists
    run: |
      if [ ! -f final_stock_model.pkl ]; then
        echo "Model file missing!"
        exit 1
      fi

  - name: Check Python Syntax
    run: python -m py_compile app.py

  - name: Test Streamlit Import
    run: |
      python - <<EOF
      import streamlit
      import pandas
      import numpy
      import sklearn
      print("All dependencies imported successfully")
      EOF
```
